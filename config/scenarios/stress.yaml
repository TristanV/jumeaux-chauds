simulation:
  mode: "stress"
  tick_rate_hz: 10.0
  events_per_sec: 2.0
  duration: "0"

  # Phase 8.14 : composite_stress — profil haute fidélité combinant :
  #   1. Cycles journaliers/hebdomadaires (charge de fond réaliste)
  #   2. Dérive progressive bornée (montée en charge sur plusieurs heures)
  #   3. Spikes stochastiques fréquents (incidents, bursts)
  #   4. Texture fine Perlin (variabilité instantanée)
  # Phase 8.15b : charge de base réduite (0.55→0.50) + pannes moins fréquentes
  #              pour cibler ~2-4 overheats/h (CRITICAL réaliste, pas catastrophique)
  load_profile:
    type: "composite_stress"
    base_load: 0.52               # Phase 8.15b : légèrement remonté pour CRITICAL stable
    # Cycles temporels
    daily_amplitude: 0.18
    daily_period_s: 86400.0
    daily_phase_s: -21600.0
    weekly_amplitude: 0.08
    weekly_period_s: 604800.0
    # Dérive thermique désactivée (Phase 8.15b) : cause un emballement sur durée longue
    drift_rate: 0.0
    drift_max: 0.0
    # Spikes d'incident (~0.5% de chance par tick)
    spike_probability: 0.005
    spike_magnitude: 0.25
    # Texture Perlin fine
    perlin_scale: 0.0003
    perlin_amplitude: 0.08
    perlin_octaves: 3

  noise:
    enabled: true
    temperature_std_c: 0.5
    spike_probability: 0.005
    spike_magnitude_c: 5.0
    drift:
      enabled: true
      rate_c_per_s: 0.01

  fault_injection:
    enabled: true
    faults:
      # Fan_failure : MTBF ~4h par machine (scale_s=14400)
      # Avec 5 machines : ~1 panne ventilateur toutes les ~50min en moyenne
      # Réaliste pour un scénario de stress majeur (surchauffe mécanique)
      - type: "fan_failure"
        distribution: "weibull"
        shape: 1.5
        scale_s: 14400             # ~4h MTBF (Phase 8.15b)
        magnitude: 1.0
      # Sensor_drift : dérive capteur fréquente sous stress
      - type: "sensor_drift"
        distribution: "exponential"
        scale_s: 7200              # ~2h MTBF (inchangé)
        magnitude: 0.5
      # Power_surge : pics de tension sous charge maximale
      - type: "power_surge"
        distribution: "uniform"
        probability_per_tick: 0.00008  # Phase 8.15b
        magnitude: 1.25            # magnitude réduite (1.30→1.25)
    recovery_delay_s: 120.0

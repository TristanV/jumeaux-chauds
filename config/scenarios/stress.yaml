simulation:
  mode: "stress"
  tick_rate_hz: 10.0
  events_per_sec: 2.0
  duration: "0"

  # Phase 8.14 : composite_stress remplace ramp_with_spikes
  # Profil haute fidélité combinant :
  #   1. Cycles journaliers/hebdomadaires (charge de fond réaliste)
  #   2. Dérive progressive bornée (montée en charge sur plusieurs heures)
  #   3. Spikes stochastiques fréquents (incidents, bursts)
  #   4. Texture fine Perlin (variabilité instantanée)
  load_profile:
    type: "composite_stress"
    base_load: 0.55
    # Cycles temporels
    daily_amplitude: 0.18
    daily_period_s: 86400.0
    daily_phase_s: -21600.0
    weekly_amplitude: 0.08
    weekly_period_s: 604800.0
    # Dérive thermique progressive (+25% sur ~12 500s simulées)
    drift_rate: 2.0e-5
    drift_max: 0.25
    # Spikes d'incident (~0.5% de chance par tick)
    spike_probability: 0.005
    spike_magnitude: 0.25
    # Texture Perlin fine
    perlin_scale: 0.0003
    perlin_amplitude: 0.08
    perlin_octaves: 3

  noise:
    enabled: true
    temperature_std_c: 0.5
    spike_probability: 0.005
    spike_magnitude_c: 5.0
    drift:
      enabled: true
      rate_c_per_s: 0.01

  fault_injection:
    enabled: true
    faults:
      - type: "fan_failure"
        distribution: "weibull"
        shape: 1.5
        scale_s: 7200
        magnitude: 1.0
      - type: "sensor_drift"
        distribution: "exponential"
        scale_s: 3600
        magnitude: 0.5
      - type: "power_surge"
        distribution: "uniform"
        probability_per_tick: 0.0002
        magnitude: 1.30
    recovery_delay_s: 120.0

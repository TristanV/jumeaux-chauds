simulation:
  mode: "busy_weeks"
  tick_rate_hz: 10.0
  events_per_sec: 1.0
  duration: "0"

  load_profile:
    type: "sine_wave"
    base_load: 0.50
    amplitude: 0.35
    period_s: 1200.0

  noise:
    enabled: true
    temperature_std_c: 0.4
    spike_probability: 0.003
    spike_magnitude_c: 2.5
    drift:
      enabled: false
      rate_c_per_s: 0.0

  fault_injection:
    enabled: true
    faults:
      - type: "power_surge"
        distribution: "exponential"
        scale_s: 7200.0
        probability_per_tick: 0.0001
        magnitude: 1.2
    recovery_delay_s: 90.0

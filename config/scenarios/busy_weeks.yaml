simulation:
  mode: "busy_weeks"
  tick_rate_hz: 10.0
  events_per_sec: 1.0
  duration: "0"

  load_profile:
    type: "perlin_noise"
    base_load: 0.52
    amplitude: 0.35
    scale: 0.00005
    n_octaves: 5
    persistence: 0.55
    drift_rate: 0.0
    drift_max: 0.0

  noise:
    enabled: true
    temperature_std_c: 0.4
    spike_probability: 0.003
    spike_magnitude_c: 2.5
    drift:
      enabled: false
      rate_c_per_s: 0.0

  fault_injection:
    enabled: true
    faults:
      - type: "fan_failure"
        distribution: "weibull"
        shape: 1.5
        scale_s: 72000
        magnitude: 1.0
      - type: "sensor_drift"
        distribution: "exponential"
        scale_s: 36000
        magnitude: 0.3
      - type: "power_surge"
        distribution: "uniform"
        probability_per_tick: 0.00002
        magnitude: 1.20
    recovery_delay_s: 120.0

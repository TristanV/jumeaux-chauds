simulation:
  mode: "busy_weeks"
  tick_rate_hz: 10.0
  events_per_sec: 1.0
  duration: "0"

  # Phase 8.14 : perlin_noise remplace sine_wave
  # Charge organique, lisse et non-répétitive — aucun pattern évident
  # Idéal pour tester des algorithmes de maintenance prédictive qui
  # ne doivent pas sur-fitter un cycle périodique.
  #
  # scale=0.00005 → variation visible sur ~20 000 s (5-6h simulées)
  # n_octaves=5   → texture multi-échelle (variations rapides + lentes)
  # drift_rate    → montée progressive de la charge sur plusieurs jours
  load_profile:
    type: "perlin_noise"
    base_load: 0.48
    amplitude: 0.32
    scale: 0.00005               # fréquence principale : ~20 000 s
    n_octaves: 5                 # richesse harmonique
    persistence: 0.55            # poids des harmoniques hautes fréquences
    drift_rate: 0.0              # pas de dérive (charge stable sur plusieurs semaines)
    drift_max: 0.0

  noise:
    enabled: true
    temperature_std_c: 0.4
    spike_probability: 0.003
    spike_magnitude_c: 2.5
    drift:
      enabled: false
      rate_c_per_s: 0.0

  fault_injection:
    enabled: true
    faults:
      - type: "power_surge"
        distribution: "exponential"
        scale_s: 7200.0
        probability_per_tick: 0.0001
        magnitude: 1.2
    recovery_delay_s: 90.0

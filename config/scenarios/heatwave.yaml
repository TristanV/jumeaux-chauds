simulation:
  mode: "heatwave"
  tick_rate_hz: 10.0
  events_per_sec: 1.0
  duration: "0"

  load_profile:
    type: "sine_wave"
    base_load: 0.55
    amplitude: 0.30
    period_s: 600.0

  noise:
    enabled: true
    temperature_std_c: 0.5
    spike_probability: 0.005
    spike_magnitude_c: 3.0
    drift:
      enabled: true
      rate_c_per_s: 0.0001

  fault_injection:
    enabled: true
    faults:
      - type: "thermal_runaway"
        distribution: "exponential"
        scale_s: 3600.0
        probability_per_tick: 0.0002
        magnitude: 1.5
    recovery_delay_s: 60.0

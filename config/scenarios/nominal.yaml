simulation:
  mode: "nominal"
  tick_rate_hz: 10.0
  events_per_sec: 1.0
  duration: "0"                      # "0" = infini ; "1h30m" = durée finie

  # Note: speed_multiplier est maintenant défini dans base.yaml (configuration globale)

  cpu_throttle_enabled: true
  cpu_throttle_target_hz: 100.0

  # Phase 8.14 : multi_scale_sine remplace sine_wave
  # Superposition de 3 cycles (rapide/journalier/hebdo) + bruit résiduel
  # → charge plus réaliste, pas de répétition visible à courte échelle
  load_profile:
    type: "multi_scale_sine"
    base_load: 0.38
    # Fluctuations intra-horaires (crons, batch courts)
    fast_amplitude: 0.08
    fast_period_s: 3600.0            # 1h simulée
    fast_phase_s: -900.0
    # Pic de milieu de journée
    daily_amplitude: 0.15
    daily_period_s: 86400.0          # 24h simulées
    daily_phase_s: -21600.0          # pic à midi (départ 6h)
    # Weekend calme
    weekly_amplitude: 0.07
    weekly_period_s: 604800.0        # 7 jours simulés
    weekly_phase_s: 0.0
    # Bruit résiduel (variabilité instantanée)
    noise_std: 0.02

  noise:
    enabled: true
    temperature_std_c: 0.3
    spike_probability: 0.002
    spike_magnitude_c: 2.0
    drift:
      enabled: false
      rate_c_per_s: 0.0

  fault_injection:
    enabled: false
    faults: []
    recovery_delay_s: 120.0

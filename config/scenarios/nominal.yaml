simulation:
  mode: "nominal"
  tick_rate_hz: 10.0
  events_per_sec: 1.0
  duration: "0"                      # "0" = infini ; "1h30m" = durée finie

  # Phase 8.4 — Contrôle de vitesse de simulation (ML data generation)
  speed_multiplier: 1.0              # défaut : real-time (1s/s)
                                     # 60.0 = 1 min/sec
                                     # 3600.0 = 1 hour/sec
                                     # 86400.0 = 1 day/sec

  cpu_throttle_enabled: true         # limiter fréquence réelle de publication
  cpu_throttle_target_hz: 100.0      # ~100 ticks réels/s max (50-500 Hz possible)

  load_profile:
    type: "sine_wave"
    base_load: 0.35
    amplitude: 0.20
    period_s: 300.0

  noise:
    enabled: true
    temperature_std_c: 0.3
    spike_probability: 0.002
    spike_magnitude_c: 2.0
    drift:
      enabled: false
      rate_c_per_s: 0.0

  fault_injection:
    enabled: false
    faults: []
    recovery_delay_s: 120.0
